<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USELESS.EXE</title>
<link href="style.css" rel="stylesheet">
</head>
<body>

<canvas id="bg"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="cursor"></div>
<div id="toast-pool"></div>

<div id="ui">
  <div class="glitch-wrap">
    <div id="title" data-text="USELESS">CLICK</div>
  </div>
  <div id="ticker">LOADING PURPOSE... ERROR 404</div>

  <button id="btn" onclick="doNothing(event)">
    <div id="btn-shadow"></div>
    <div id="btn-inner">DO NOTHING</div>
  </button>

  <div id="stats">
    <div class="stat">
      <div class="stat-label">clicks wasted</div>
      <div class="stat-val" id="count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">seconds lost</div>
      <div class="stat-val" id="secs">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">purpose found</div>
      <div class="stat-val" id="purpose" style="color:var(--c2);text-shadow:0 0 20px var(--c2)">0</div>
    </div>
  </div>
</div>

<div id="footer">© Nothing Inc. · Patent Pending on Doing Nothing · Est. The Void</div>

<script src="main.js"></script>
</body>
</html>
